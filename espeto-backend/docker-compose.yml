version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: espetopro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: espeto
      POSTGRES_PASSWORD: espeto123
      POSTGRES_DB: espetopro
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U espeto -d espetopro']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: espetopro_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@espeto.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local